name: CI

on:
  push:
    branches: [main]
    paths:
      - "apps/sample-service/**"
      - "charts/sample-service/**"
  pull_request:
    branches: [main]
    paths:
      - "apps/sample-service/**"
      - "charts/sample-service/**"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/sample-service

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/sample-service/src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - name: Run tests
        run: go test ./... -v -race -coverprofile=coverage.out
      - name: Enforce coverage threshold
        env:
          THRESHOLD: "50"
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}' | tr -d '%')
          echo "Total coverage: ${total}% (threshold ${THRESHOLD}%)"
          if awk -v t="$total" -v min="$THRESHOLD" 'BEGIN { exit (t < min) ? 1 : 0 }'; then
            echo "Coverage check passed"
          else
            echo "Coverage ${total}% is below the ${THRESHOLD}% threshold"
            exit 1
          fi
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: apps/sample-service/src/coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: golangci/golangci-lint-action@v4
        with:
          working-directory: apps/sample-service/src

  helm:
    name: Helm chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4
      - name: Lint chart
        run: helm lint charts/sample-service
      - name: Smoke render templates
        run: helm template sample-service charts/sample-service > /dev/null
      - name: Install kubeconform
        run: |
          curl -sSL -o kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar xzf kubeconform.tar.gz kubeconform
          sudo install kubeconform /usr/local/bin/
      - name: Validate rendered manifests against Kubernetes schema
        run: |
          helm template sample-service charts/sample-service \
            | kubeconform -strict -summary -verbose \
                -kubernetes-version 1.29.0 -schema-location default
      - name: Validate environment overlays against Kubernetes schema
        run: |
          for env in staging production; do
            echo "Validating $env overlay"
            helm template sample-service charts/sample-service \
              -f charts/sample-service/values.yaml \
              -f charts/sample-service/values-$env.yaml \
              | kubeconform -strict -summary \
                  -kubernetes-version 1.29.0 -schema-location default
          done

  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: apps/sample-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: APP_VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  scan:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1

  update-staging-values:
    name: Update staging image tag
    runs-on: ubuntu-latest
    needs: [build-and-push, scan]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Update image tag in staging values
        run: |
          sed -i "s/tag:.*/tag: \"${{ needs.build-and-push.outputs.image_tag }}\"/" \
            charts/sample-service/values-staging.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/sample-service/values-staging.yaml
          git commit -m "chore: update staging image tag to ${{ needs.build-and-push.outputs.image_tag }}" || true
          git push

  sign-image:
    name: Sign image with cosign
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    permissions:
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: sigstore/cosign-installer@v3
      - name: Sign the container image
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}
